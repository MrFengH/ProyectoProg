<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESSENCE | Registro</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="login-nav">
        <a href="index.jsp" class="logo">
            <img src="assets/logo.png" alt="Logo ESSENCE">
            <span>ESSENCE</span>
        </a>

        <div class="nav-links">
            <a href="index.jsp">Inicio</a>
            <a href="productos.jsp">Colección</a>
            <a href="login.html">Iniciar sesión</a>
        </div>
        <div class="top-icons">
            <a href="https://www.google.com">
                <img src="assets/lupa.png" alt="Buscar" class="search-icon">
            </a>
            <a href="https://www.instagram.com">IG</a>
            <a href="https://www.facebook.com">F</a>
            <a href="https://www.x.com">X</a>
        </div>
    </nav>

    <main class="main-container">
        <article class="form-card">
            <h2>Registro</h2>
            <p>Crea una cuenta para descubrir tu proxima fragancia.</p>

            <form action="procesarRegistro.jsp" method="post">
                <label for="register-name">Nombre completo</label>
                <input type="text" id="register-name" name="register-name" placeholder="Tu nombre">

                <label for="register-email">Correo electrónico</label>
                <input type="email" id="register-email" name="register-email" placeholder="usuario@correo.com">

                <label for="register-password">Contraseña</label>
                <input type="password" id="register-password" name="register-password" placeholder="Crea una contraseñaa">

                <button type="submit">Crear cuenta</button>
            </form>

            <p class="form-link">¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a></p>
        </article>
    </main>

    <footer class="footer">
        <div class="footer-menu">
            <a href="index.jsp">Inicio</a>
            <a href="productos.jsp">Colección</a>
            <a href="contacto.html">Sobre Nosotros</a>
            <a href="logout.jsp">Logout</a>
        </div>
        <p>&copy; 2026 ESSENCE. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
