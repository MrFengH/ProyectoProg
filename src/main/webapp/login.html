<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESSENCE | Iniciar Sesion</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="login-nav">
        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="Logo ESSENCE">
            <span>ESSENCE</span>
        </a>

        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="index.html#coleccion">Colección</a>
            <a href="registro.html">Registrar</a>
        </div>
        <div class="top-icons">
            <a href="https://www.google.com" aria-label="Buscar en Google">
                <img src="assets/lupa.png" alt="Buscar" class="search-icon">
            </a>
            <a href="https://www.instagram.com" aria-label="Instagram">IG</a>
            <a href="https://www.facebook.com" aria-label="Facebook">F</a>
            <a href="https://www.x.com" aria-label="X">X</a>
        </div>
    </nav>

    <main class="main-container">
        <article class="form-card">
            <h2>Iniciar sesión</h2>
            <p>Accede con tu correo y contrasena.</p>

            <form>
                <label for="login-email">Correo electrónico</label>
                <input type="email" id="login-email" name="login-email" placeholder="usuario@correo.com">

                <label for="login-password">Contraseña</label>
                <input type="password" id="login-password" name="login-password" placeholder="Ingresa tu contrasena">

                <button type="submit">Entrar</button>
            </form>

            <p class="form-link">¿No tienes cuenta? <a href="registro.html">Registrar</a></p>
        </article>
    </main>

    <footer class="footer">
        <div class="footer-menu">
            <a href="index.html">Inicio</a>
            <a href="index.html#coleccion">Colección</a>
            <a href="contacto.html">Sobre Nosotros</a>
            <a href="login.html">Logout</a>
        </div>
        <p>&copy; 2026 ESSENCE. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
